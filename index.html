<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>日翊收發進貨平台</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="收發平台" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(160deg, #ffffff 0%, #dbeafe 50%, #2563eb 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: #fff; border-radius: 28px; padding: 32px 24px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(37,99,235,.2); }
    .login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .login-logo svg { width: 32px; height: 32px; stroke: #fff; }
    /* 表單樣式 */
    .field-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .input { width: 100%; border: 1.5px solid #dbeafe; border-radius: 12px;
      padding: 13px 14px; font-size: 15px; outline: none; background: #f0f7ff;
      transition: border-color .15s, background .15s; font-family: inherit; }
    .input:focus { border-color: #2563eb; background: #fff; }
    .btn { display: flex; align-items: center; justify-content: center;
      border-radius: 14px; font-weight: 600; font-size: 15px; padding: 14px 20px;
      cursor: pointer; border: none; width: 100%; font-family: inherit; transition: all .15s; }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff;
      box-shadow: 0 4px 14px rgba(37,99,235,.4); }
    .btn-success { background: #dbeafe; color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
    </div>
    <h1 style="text-align:center;font-size:20px;font-weight:800;color:#111827;margin-bottom:4px">日翊收發進貨平台</h1>
    <p style="text-align:center;font-size:13px;color:#6b7280;margin-bottom:24px">物流驗收管理系統</p>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:24px">
      <button onclick="showTab('login')" id="tab-login"
        style="flex:1;padding:10px;font-size:14px;font-weight:600;color:#4f46e5;background:none;border:none;cursor:pointer;border-bottom:2px solid #4f46e5">登入</button>
      <button onclick="showTab('register')" id="tab-register"
        style="flex:1;padding:10px;font-size:14px;font-weight:600;color:#9ca3af;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent">申請帳號</button>
    </div>

    <!-- 登入 -->
    <div id="panel-login">
      <form onsubmit="handleLogin(event)">
        <div style="margin-bottom:14px">
          <label class="field-label">帳號</label>
          <input id="userId" type="text" maxlength="20" placeholder="請輸入帳號" class="input" required autocomplete="username" />
        </div>
        <div style="margin-bottom:20px">
          <label class="field-label">密碼</label>
          <input id="password" type="password" maxlength="30" placeholder="請輸入密碼" class="input" required autocomplete="current-password" />
        </div>
        <div id="loginError" style="display:none;margin-bottom:14px;padding:12px 14px;background:#fee2e2;border-radius:12px;font-size:13px;color:#991b1b"></div>
        <button id="loginBtn" type="submit" class="btn btn-primary" style="width:100%">登入</button>
      </form>
    </div>

    <!-- 申請帳號 -->
    <div id="panel-register" style="display:none">
      <form onsubmit="handleRegister(event)">
        <div style="margin-bottom:14px">
          <label class="field-label">帳號</label>
          <input id="reg-userId" type="text" maxlength="20" placeholder="請設定帳號" class="input" required />
        </div>
        <div style="margin-bottom:14px">
          <label class="field-label">密碼</label>
          <input id="reg-password" type="password" maxlength="30" placeholder="請設定密碼" class="input" required />
        </div>
        <div style="margin-bottom:20px">
          <label class="field-label">姓名</label>
          <input id="reg-name" type="text" maxlength="20" placeholder="請輸入真實姓名" class="input" required />
        </div>
        <div id="registerMsg" style="display:none;margin-bottom:14px;padding:12px 14px;border-radius:12px;font-size:13px"></div>
        <button type="submit" class="btn btn-success" style="width:100%">送出申請</button>
        <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:12px">申請後由管理員審核開通</p>
      </form>
    </div>
  </div>

  <!-- 版本選擇 Modal（登入後顯示）-->
  <div id="versionModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
    z-index:100;display:none;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:360px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:16px;
        display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg style="width:26px;height:26px;stroke:#fff" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h2 style="font-size:18px;font-weight:800;color:#111;margin-bottom:6px">選擇使用版本</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:24px">請選擇適合您裝置的版本</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <button onclick="goVersion('main.html')"
          style="border:2px solid #dbeafe;border-radius:16px;padding:20px 12px;cursor:pointer;
            background:#f0f7ff;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px"
          onmouseover="this.style.borderColor='#2563eb';this.style.background='#dbeafe'"
          onmouseout="this.style.borderColor='#dbeafe';this.style.background='#f0f7ff'">
          <svg style="width:32px;height:32px;stroke:#2563eb" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <div>
            <div style="font-size:14px;font-weight:700;color:#1d4ed8">電腦版</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px">桌機 / 筆電</div>
          </div>
        </button>
        <button onclick="goVersion('app.html')"
          style="border:2px solid #dbeafe;border-radius:16px;padding:20px 12px;cursor:pointer;
            background:#f0f7ff;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px"
          onmouseover="this.style.borderColor='#2563eb';this.style.background='#dbeafe'"
          onmouseout="this.style.borderColor='#dbeafe';this.style.background='#f0f7ff'">
          <svg style="width:32px;height:32px;stroke:#2563eb" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          <div>
            <div style="font-size:14px;font-weight:700;color:#1d4ed8">APP 版</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px">手機 / 平板</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    function goVersion(page) {
      window.location.href = page;
    }
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('panel-login').style.display    = isLogin ? '' : 'none';
      document.getElementById('panel-register').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').style.color        = isLogin ? '#4f46e5' : '#9ca3af';
      document.getElementById('tab-login').style.borderBottomColor  = isLogin ? '#4f46e5' : 'transparent';
      document.getElementById('tab-register').style.color     = isLogin ? '#9ca3af' : '#4f46e5';
      document.getElementById('tab-register').style.borderBottomColor = isLogin ? 'transparent' : '#4f46e5';
    }
    async function handleRegister(e) {
      e.preventDefault();
      const userId = document.getElementById('reg-userId').value.trim();
      const password = document.getElementById('reg-password').value;
      const name = document.getElementById('reg-name').value.trim();
      const msgEl = document.getElementById('registerMsg');
      try {
        const msg = await AuthAPI.register(userId, password, name);
        msgEl.textContent = msg;
        msgEl.style.background = '#d1fae5'; msgEl.style.color = '#065f46';
        document.getElementById('reg-userId').value = '';
        document.getElementById('reg-password').value = '';
        document.getElementById('reg-name').value = '';
      } catch(err) {
        msgEl.textContent = err.message;
        msgEl.style.background = '#fee2e2'; msgEl.style.color = '#991b1b';
      }
      msgEl.style.display = 'block';
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
