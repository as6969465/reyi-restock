<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日翊收發進貨平台 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-full mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">日翊收發進貨平台</h1>
    </div>

    <!-- Tab -->
    <div class="flex border-b border-gray-200 mb-6">
      <button onclick="showTab('login')" id="tab-login"
        class="flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">登入</button>
      <button onclick="showTab('register')" id="tab-register"
        class="flex-1 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600">申請帳號</button>
    </div>

    <!-- 登入 -->
    <div id="panel-login">
      <form onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
          <input id="userId" type="text" maxlength="15" placeholder="請輸入帳號"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
          <input id="password" type="password" maxlength="30" placeholder="請輸入密碼"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div id="loginError" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>
        <button id="loginBtn" type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm disabled:opacity-50">
          登入
        </button>
      </form>
    </div>

    <!-- 申請帳號 -->
    <div id="panel-register" class="hidden">
      <form onsubmit="handleRegister(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">帳號 <span class="text-red-500">*</span></label>
          <input id="reg-userId" type="text" maxlength="20" placeholder="請設定帳號"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼 <span class="text-red-500">*</span></label>
          <input id="reg-password" type="password" maxlength="30" placeholder="請設定密碼"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
          <input id="reg-name" type="text" maxlength="20" placeholder="請輸入真實姓名"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div id="registerMsg" class="hidden mb-4 text-sm rounded-lg px-4 py-3"></div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          送出申請
        </button>
        <p class="text-xs text-gray-400 text-center mt-3">申請後由管理員審核並指派角色後即可登入</p>
      </form>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    function showTab(tab) {
      ['login','register'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById(`tab-${t}`);
        btn.classList.toggle('text-indigo-600', t === tab);
        btn.classList.toggle('border-indigo-600', t === tab);
        btn.classList.toggle('text-gray-400', t !== tab);
        btn.classList.toggle('border-transparent', t !== tab);
      });
    }
    async function handleRegister(e) {
      e.preventDefault();
      const userId   = document.getElementById('reg-userId').value.trim();
      const password = document.getElementById('reg-password').value;
      const name     = document.getElementById('reg-name').value.trim();
      const msgEl    = document.getElementById('registerMsg');
      try {
        const msg = await AuthAPI.register(userId, password, name);
        msgEl.textContent = msg;
        msgEl.className = 'mb-4 text-sm text-green-600 bg-green-50 border border-green-200 rounded-lg px-4 py-3';
        document.getElementById('reg-userId').value   = '';
        document.getElementById('reg-password').value = '';
        document.getElementById('reg-name').value     = '';
      } catch(err) {
        msgEl.textContent = err.message;
        msgEl.className = 'mb-4 text-sm text-orange-600 bg-orange-50 border border-orange-200 rounded-lg px-4 py-3';
      }
      msgEl.classList.remove('hidden');
    }
      users.push({ userId, password, name, role: 'pending', createdAt: new Date().toLocaleString('zh-TW') });
      localStorage.setItem('rr_users', JSON.stringify(users));
      msgEl.textContent = `申請成功！帳號「${userId}」已送出，請等待管理員開通後即可登入。`;
      msgEl.className = 'mb-4 text-sm text-green-600 bg-green-50 border border-green-200 rounded-lg px-4 py-3';
      msgEl.classList.remove('hidden');
      document.getElementById('reg-userId').value   = '';
      document.getElementById('reg-password').value = '';
      document.getElementById('reg-name').value     = '';
    }
  </script>
</body>
</html>
